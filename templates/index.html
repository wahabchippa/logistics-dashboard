<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3PL Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #0B1120;
            color: #fff;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #0B1120 0%, #1E293B 100%);
            padding: 20px 40px;
            border-bottom: 3px solid #FBBF24;
            text-align: center;
        }
        
        .header h1 {
            color: #FBBF24;
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #94A3B8;
            font-size: 14px;
        }
        
        /* Week Selector */
        .week-selector {
            background: #1E293B;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #334155;
        }
        
        .week-selector label {
            color: #94A3B8;
            font-weight: 500;
        }
        
        .week-selector input {
            background: #0F172A;
            border: 1px solid #334155;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .week-info {
            color: #FBBF24;
            font-weight: 500;
            margin-left: auto;
        }
        
        /* Main Container */
        .container {
            padding: 30px 40px;
        }
        
        /* Provider Card */
        .provider-card {
            background: #1E293B;
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        
        .provider-header {
            background: #0F172A;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #FBBF24;
        }
        
        .provider-name {
            color: #FBBF24;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .provider-stats {
            display: flex;
            gap: 20px;
        }
        
        .stat-badge {
            background: #334155;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .stat-badge.highlight {
            background: #FBBF24;
            color: #0B1120;
            font-weight: 700;
        }
        
        /* Data Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background: #0F172A;
            padding: 12px 15px;
            text-align: center;
            font-size: 12px;
            color: #94A3B8;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .data-table th.flight-day {
            background: #1E293B;
            color: #FBBF24;
            border-left: 2px solid #FBBF24;
            border-right: 2px solid #FBBF24;
        }
        
        .data-table td {
            padding: 12px 15px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #334155;
        }
        
        .data-table tr:hover {
            background: #334155;
        }
        
        .data-table td.flight-day {
            background: rgba(251, 191, 36, 0.1);
            border-left: 2px solid #FBBF24;
            border-right: 2px solid #FBBF24;
        }
        
        .data-table .total-row {
            background: #0F172A;
            font-weight: 700;
        }
        
        .data-table .total-row td {
            color: #FBBF24;
            border-top: 2px solid #FBBF24;
        }
        
        /* Summary Section */
        .summary-section {
            margin-top: 40px;
        }
        
        .summary-header {
            background: #0B1120;
            padding: 15px 20px;
            border-radius: 12px 12px 0 0;
            border: 2px solid #FBBF24;
            border-bottom: none;
        }
        
        .summary-header h2 {
            color: #FBBF24;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            background: #1E293B;
            border: 2px solid #FBBF24;
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }
        
        .summary-table th {
            background: #0F172A;
            padding: 12px;
            color: #94A3B8;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .summary-table th.flight {
            background: #1E293B;
            color: #FBBF24;
        }
        
        .summary-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        
        .summary-table .winner {
            background: rgba(251, 191, 36, 0.2);
        }
        
        .summary-table .winner td:first-child {
            color: #FBBF24;
            font-weight: 700;
        }
        
        .grand-total {
            background: #0F172A !important;
            color: #FBBF24 !important;
            font-weight: 700 !important;
        }
        
        /* Flight Consolidation */
        .flight-section {
            margin-top: 40px;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #94A3B8;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #334155;
            border-top: 4px solid #FBBF24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Error */
        .error {
            background: #7F1D1D;
            color: #FCA5A5;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✦ GLOBAL LOGISTICS EXECUTIVE PORTAL ✦</h1>
        <p>3PL Weekly Performance Dashboard</p>
    </div>
    
    <div class="week-selector">
        <label>📅 SELECT WEEK START:</label>
        <input type="date" id="weekStart" onchange="loadData()">
        <div class="week-info" id="weekInfo">Loading...</div>
    </div>
    
    <div class="container" id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading dashboard data...</p>
        </div>
    </div>
    
    <script>
        // Set default date to current week's Monday
        const today = new Date();
        const monday = new Date(today);
        monday.setDate(today.getDate() - today.getDay() + 1);
        document.getElementById('weekStart').value = monday.toISOString().split('T')[0];
        
        // Days of week
        const DAYS = ['MON', 'TUE ✈️', 'WED', 'THU ✈️', 'FRI', 'SAT ✈️', 'SUN'];
        const FLIGHT_DAYS = [1, 3, 5]; // Tuesday, Thursday, Saturday
        
        async function loadData() {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading dashboard data...</p>
                </div>
            `;
            
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                document.getElementById('weekInfo').textContent = 
                    `Week: ${data.week_start} to ${data.week_end}`;
                
                renderDashboard(data);
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <h3>⚠️ Error Loading Data</h3>
                        <p>${error.message}</p>
                        <p style="margin-top:10px; font-size:12px;">Make sure Google Sheet is accessible</p>
                    </div>
                `;
            }
        }
        
        function renderDashboard(data) {
            const container = document.getElementById('mainContent');
            let html = '';
            
            // Provider Cards
            data.providers.forEach(provider => {
                html += `
                    <div class="provider-card">
                        <div class="provider-header">
                            <span class="provider-name">✦ ${provider.name}</span>
                            <div class="provider-stats">
                                <span class="stat-badge">Orders: ${provider.total.orders}</span>
                                <span class="stat-badge">Boxes: ${provider.total.boxes.toFixed(0)}</span>
                                <span class="stat-badge highlight">Weight: ${provider.total.weight.toFixed(1)} kg</span>
                            </div>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Metric</th>
                                    ${DAYS.map((day, i) => `
                                        <th class="${FLIGHT_DAYS.includes(i) ? 'flight-day' : ''}">${day}</th>
                                    `).join('')}
                                    <th>TOTAL</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>Orders</strong></td>
                                    ${provider.days.map((d, i) => `
                                        <td class="${FLIGHT_DAYS.includes(i) ? 'flight-day' : ''}">${d.orders || '-'}</td>
                                    `).join('')}
                                    <td><strong>${provider.total.orders}</strong></td>
                                </tr>
                                <tr>
                                    <td><strong>Boxes</strong></td>
                                    ${provider.days.map((d, i) => `
                                        <td class="${FLIGHT_DAYS.includes(i) ? 'flight-day' : ''}">${d.boxes ? d.boxes.toFixed(0) : '-'}</td>
                                    `).join('')}
                                    <td><strong>${provider.total.boxes.toFixed(0)}</strong></td>
                                </tr>
                                <tr>
                                    <td><strong>Weight (kg)</strong></td>
                                    ${provider.days.map((d, i) => `
                                        <td class="${FLIGHT_DAYS.includes(i) ? 'flight-day' : ''}">${d.weight ? d.weight.toFixed(1) : '-'}</td>
                                    `).join('')}
                                    <td><strong>${provider.total.weight.toFixed(1)}</strong></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
            });
            
            // Weekly Performance Summary
            const maxWeight = Math.max(...data.providers.map(p => p.total.weight));
            
            html += `
                <div class="summary-section">
                    <div class="summary-header">
                        <h2>📊 WEEKLY PERFORMANCE SUMMARY (🏆 HIGHEST WEIGHT WINNER)</h2>
                    </div>
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th>Provider</th>
                                ${DAYS.map((day, i) => `
                                    <th colspan="3" class="${FLIGHT_DAYS.includes(i) ? 'flight' : ''}">${day}</th>
                                `).join('')}
                                <th colspan="3">GRAND TOTAL</th>
                            </tr>
                            <tr>
                                <th></th>
                                ${DAYS.map(() => `
                                    <th>Ord</th><th>Box</th><th>KG</th>
                                `).join('')}
                                <th>Ord</th><th>Box</th><th>KG</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.providers.map(provider => `
                                <tr class="${provider.total.weight === maxWeight ? 'winner' : ''}">
                                    <td>${provider.total.weight === maxWeight ? '🏆 ' : ''}${provider.name}</td>
                                    ${provider.days.map(d => `
                                        <td>${d.orders || '-'}</td>
                                        <td>${d.boxes ? d.boxes.toFixed(0) : '-'}</td>
                                        <td>${d.weight ? d.weight.toFixed(1) : '-'}</td>
                                    `).join('')}
                                    <td class="grand-total">${provider.total.orders}</td>
                                    <td class="grand-total">${provider.total.boxes.toFixed(0)}</td>
                                    <td class="grand-total">${provider.total.weight.toFixed(1)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            // Flight Consolidation
            html += `
                <div class="flight-section">
                    <div class="summary-header">
                        <h2>✈️ CONSOLIDATED FLIGHT LOAD (PRE-FLIGHT + FLIGHT DAY)</h2>
                    </div>
                    <table class="summary-table">
                        <thead>
                            <tr>
                                <th>Provider</th>
                                <th colspan="3">✈️ TUE FLIGHT (Mon+Tue)</th>
                                <th colspan="3">✈️ THU FLIGHT (Wed+Thu)</th>
                                <th colspan="3">✈️ SAT FLIGHT (Fri+Sat)</th>
                                <th colspan="3">TOTAL FLIGHT LOAD</th>
                            </tr>
                            <tr>
                                <th></th>
                                <th>Ord</th><th>Box</th><th>KG</th>
                                <th>Ord</th><th>Box</th><th>KG</th>
                                <th>Ord</th><th>Box</th><th>KG</th>
                                <th>Ord</th><th>Box</th><th>KG</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.providers.map(provider => {
                                // Calculate flight consolidations
                                const tue = {
                                    orders: provider.days[0].orders + provider.days[1].orders,
                                    boxes: provider.days[0].boxes + provider.days[1].boxes,
                                    weight: provider.days[0].weight + provider.days[1].weight
                                };
                                const thu = {
                                    orders: provider.days[2].orders + provider.days[3].orders,
                                    boxes: provider.days[2].boxes + provider.days[3].boxes,
                                    weight: provider.days[2].weight + provider.days[3].weight
                                };
                                const sat = {
                                    orders: provider.days[4].orders + provider.days[5].orders,
                                    boxes: provider.days[4].boxes + provider.days[5].boxes,
                                    weight: provider.days[4].weight + provider.days[5].weight
                                };
                                const total = {
                                    orders: tue.orders + thu.orders + sat.orders,
                                    boxes: tue.boxes + thu.boxes + sat.boxes,
                                    weight: tue.weight + thu.weight + sat.weight
                                };
                                
                                return `
                                    <tr>
                                        <td>${provider.name}</td>
                                        <td>${tue.orders || '-'}</td>
                                        <td>${tue.boxes ? tue.boxes.toFixed(0) : '-'}</td>
                                        <td>${tue.weight ? tue.weight.toFixed(1) : '-'}</td>
                                        <td>${thu.orders || '-'}</td>
                                        <td>${thu.boxes ? thu.boxes.toFixed(0) : '-'}</td>
                                        <td>${thu.weight ? thu.weight.toFixed(1) : '-'}</td>
                                        <td>${sat.orders || '-'}</td>
                                        <td>${sat.boxes ? sat.boxes.toFixed(0) : '-'}</td>
                                        <td>${sat.weight ? sat.weight.toFixed(1) : '-'}</td>
                                        <td class="grand-total">${total.orders}</td>
                                        <td class="grand-total">${total.boxes.toFixed(0)}</td>
                                        <td class="grand-total">${total.weight.toFixed(1)}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
