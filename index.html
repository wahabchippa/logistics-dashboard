<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Ops 3PL Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
            <div>
                <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                    ✦ GLOBAL LOGISTICS EXECUTIVE PORTAL ✦
                </h1>
                <p class="text-slate-400 text-sm mt-1">Real-time 3PL Performance Summary</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-900/80 p-3 rounded-xl border border-slate-700">
                <span class="text-emerald-400 text-sm font-medium">Select Week:</span>
                <input type="date" id="datePicker" class="bg-transparent border-none text-white focus:ring-0 cursor-pointer">
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800/80">
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold sticky left-0 bg-slate-800 z-10">3PL Provider</th>
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold text-center">Monday</th>
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold text-center">Tuesday</th>
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold text-center">Wednesday</th>
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold text-center">Thursday</th>
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold text-center">Friday</th>
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold text-center bg-slate-700/30">Saturday</th>
                            <th class="p-4 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider font-bold text-center bg-slate-700/30">Sunday</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-800">
                        <tr><td colspan="8" class="p-20 text-center text-slate-500 animate-pulse">Initializing data streams...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1V03fqI2tGbY3ImkQaoZGwJ98iyrN4z_GXRKRP023zUY';
        const PROVIDERS = [
            { name: 'GLOBAL EXPRESS (QC)', sheet: 'GE QC Center & Zone', dateIdx: 1, boxIdx: 2, wgtIdx: 5 },
            { name: 'ECL LOGISTICS (QC)', sheet: 'ECL QC Center & Zone', dateIdx: 1, boxIdx: 2, wgtIdx: 5 },
            { name: 'KERRY LOGISTICS', sheet: 'Kerry', dateIdx: 1, boxIdx: 2, wgtIdx: 5 },
            { name: 'APX EXPRESS', sheet: 'APX', dateIdx: 1, boxIdx: 2, wgtIdx: 5 }
        ];

        // Set default date to current Monday
        const dp = document.getElementById('datePicker');
        const today = new Date();
        const monday = new Date(today.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1)));
        dp.value = monday.toISOString().split('T')[0];

        async function loadData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="8" class="p-20 text-center text-emerald-400">Fetching Live Data...</td></tr>';
            
            const selectedDate = new Date(dp.value);
            const weekDates = Array.from({length: 7}, (_, i) => {
                const d = new Date(selectedDate);
                d.setDate(d.getDate() + i);
                return d.toLocaleDateString('en-GB').replace(/\//g, '-');
            });

            try {
                let html = '';
                for (const p of PROVIDERS) {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(p.sheet)}`;
                    const response = await fetch(url);
                    const csvData = await response.text();
                    const json = Papa.parse(csvData).data;

                    html += `<tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="p-4 font-bold text-emerald-400 sticky left-0 bg-slate-900 border-r border-slate-800">${p.name}</td>`;

                    weekDates.forEach((dateStr, idx) => {
                        let boxes = 0, weight = 0;
                        json.forEach(row => {
                            if (row[p.dateIdx] === dateStr) {
                                boxes += parseInt(row[p.boxIdx]) || 0;
                                weight += parseFloat(row[p.wgtIdx]) || 0;
                            }
                        });
                        
                        const isWeekend = idx >= 5;
                        html += `<td class="p-4 text-center ${isWeekend ? 'bg-slate-800/20' : ''}">
                            <div class="text-lg font-semibold text-white">${boxes}</div>
                            <div class="text-[10px] text-slate-500 font-mono">${weight.toFixed(1)}kg</div>
                        </td>`;
                    });
                    html += `</tr>`;
                }
                tableBody.innerHTML = html;
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-red-400">Error: Please ensure Google Sheet is PUBLIC (Anyone with link can view)</td></tr>`;
            }
        }

        dp.addEventListener('change', loadData);
        loadData();
    </script>
</body>
</html>
