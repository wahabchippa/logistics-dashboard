<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Ops 3PL Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-[#050505] text-slate-200 font-sans min-h-screen">
    <div class="max-w-full mx-auto p-4 md:p-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-[#111] p-5 rounded-xl border border-zinc-800">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-emerald-500 uppercase">
                    3PL WEEKLY PERFORMANCE SUMMARY
                </h1>
                <p class="text-zinc-500 text-xs uppercase tracking-widest">Live Logistics Intelligence Dashboard</p>
            </div>
            <div class="flex items-center gap-4 bg-black p-2 px-4 rounded-lg border border-zinc-800">
                <span class="text-zinc-400 text-xs font-bold uppercase">Select Week:</span>
                <input type="date" id="datePicker" class="bg-transparent border-none text-white text-sm focus:ring-0 cursor-pointer outline-none">
            </div>
        </div>

        <div class="bg-[#111] rounded-xl border border-zinc-800 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-zinc-900/50">
                            <th class="p-4 border-b border-zinc-800 text-zinc-500 text-[10px] uppercase font-black sticky left-0 bg-[#111] z-10 w-48">Partner Agency</th>
                            <th class="p-4 border-b border-zinc-800 text-zinc-500 text-[10px] uppercase font-black text-center">Mon</th>
                            <th class="p-4 border-b border-zinc-800 text-zinc-500 text-[10px] uppercase font-black text-center">Tue</th>
                            <th class="p-4 border-b border-zinc-800 text-zinc-500 text-[10px] uppercase font-black text-center">Wed</th>
                            <th class="p-4 border-b border-zinc-800 text-zinc-500 text-[10px] uppercase font-black text-center">Thu</th>
                            <th class="p-4 border-b border-zinc-800 text-zinc-500 text-[10px] uppercase font-black text-center">Fri</th>
                            <th class="p-4 border-b border-zinc-800 text-emerald-700 text-[10px] uppercase font-black text-center bg-emerald-950/10">Sat</th>
                            <th class="p-4 border-b border-zinc-800 text-emerald-700 text-[10px] uppercase font-black text-center bg-emerald-950/10">Sun</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-zinc-800/50">
                        </tbody>
                </table>
            </div>
        </div>
        <div id="loader" class="mt-4 text-center text-[10px] text-zinc-600 uppercase tracking-widest">System Ready. Awaiting Date Selection...</div>
    </div>

    <script>
        const SHEET_ID = '1V03fqI2tGbY3ImkQaoZGwJ98iyrN4z_GXRKRP023zUY';
        const PROVIDERS = [
            { name: 'GLOBAL EXPRESS (QC)', sheet: 'GE QC Center & Zone', dateIdx: 1, boxIdx: 2, wgtIdx: 5 },
            { name: 'ECL LOGISTICS (QC)', sheet: 'ECL QC Center & Zone', dateIdx: 1, boxIdx: 2, wgtIdx: 5 },
            { name: 'KERRY LOGISTICS', sheet: 'Kerry', dateIdx: 1, boxIdx: 2, wgtIdx: 5 },
            { name: 'APX EXPRESS', sheet: 'APX', dateIdx: 1, boxIdx: 2, wgtIdx: 5 }
        ];

        const dp = document.getElementById('datePicker');
        // Initial Monday setup
        const now = new Date();
        const monday = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));
        dp.value = monday.toISOString().split('T')[0];

        async function fetchData() {
            const tableBody = document.getElementById('tableBody');
            const loader = document.getElementById('loader');
            loader.innerText = "⚡ FETCHING LIVE DATA FROM CLOUD...";
            
            const selectedDate = new Date(dp.value);
            // Array to store 7 days of the week in multiple formats to match sheet
            const weekFormats = Array.from({length: 7}, (_, i) => {
                const d = new Date(selectedDate);
                d.setDate(d.getDate() + i);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                return [`${day}/${month}/${year}`, `${day}-${month}-${year}`, d.toLocaleDateString('en-GB')];
            });

            try {
                let html = '';
                for (const p of PROVIDERS) {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(p.sheet)}`;
                    const res = await fetch(url);
                    const csv = await res.text();
                    const data = Papa.parse(csv).data;

                    html += `<tr class="hover:bg-zinc-900/30 transition-all border-l-2 border-transparent hover:border-emerald-500">
                        <td class="p-4 font-bold text-xs text-zinc-400 sticky left-0 bg-[#050505] z-10">${p.name}</td>`;

                    weekFormats.forEach((formats, idx) => {
                        let boxes = 0, weight = 0;
                        data.forEach(row => {
                            // Check if row date matches any of our formats
                            if (formats.includes(String(row[p.dateIdx]).trim())) {
                                boxes += parseInt(row[p.boxIdx]) || 0;
                                weight += parseFloat(row[p.wgtIdx]) || 0;
                            }
                        });

                        const isWeekend = idx >= 5;
                        html += `<td class="p-4 text-center ${isWeekend ? 'bg-emerald-500/5' : ''}">
                            <div class="text-sm font-bold ${boxes > 0 ? 'text-emerald-400' : 'text-zinc-700'}">${boxes}</div>
                            <div class="text-[9px] font-mono text-zinc-600">${weight.toFixed(1)}kg</div>
                        </td>`;
                    });
                    html += `</tr>`;
                }
                tableBody.innerHTML = html;
                loader.innerText = "✓ ALL STREAMS SYNCHRONIZED";
            } catch (e) {
                loader.innerText = "❌ ERROR: CHECK SHEET PERMISSIONS";
            }
        }

        dp.addEventListener('change', fetchData);
        window.onload = fetchData;
    </script>
</body>
</html>
