<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Ops Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-zinc-300 font-sans min-h-screen p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-zinc-900/50 p-6 rounded-2xl border border-zinc-800 shadow-2xl">
            <div>
                <h1 class="text-2xl font-black text-emerald-500 italic tracking-tighter uppercase">G-OPS LIVE SUMMARY</h1>
                <p id="status" class="text-[9px] text-zinc-500 uppercase tracking-[0.3em] mt-1 font-bold italic">Cloud Connection Active</p>
            </div>
            <div class="flex items-center gap-4 bg-black p-3 px-6 rounded-xl border border-zinc-700 mt-4 md:mt-0">
                <span class="text-emerald-500 text-xs font-bold uppercase">Week Starting:</span>
                <input type="date" id="datePicker" class="bg-transparent border-none text-white text-sm focus:ring-0 cursor-pointer outline-none">
            </div>
        </div>

        <div class="bg-zinc-900/30 rounded-2xl border border-zinc-800 overflow-hidden backdrop-blur-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-zinc-800/40 text-[10px] uppercase font-black text-zinc-500 tracking-widest">
                            <th class="p-5 border-b border-zinc-800 sticky left-0 bg-[#050505] z-10">3PL Provider</th>
                            <th class="p-5 border-b border-zinc-800 text-center">Mon</th>
                            <th class="p-5 border-b border-zinc-800 text-center">Tue</th>
                            <th class="p-5 border-b border-zinc-800 text-center">Wed</th>
                            <th class="p-5 border-b border-zinc-800 text-center">Thu</th>
                            <th class="p-5 border-b border-zinc-800 text-center">Fri</th>
                            <th class="p-5 border-b border-zinc-800 text-center bg-emerald-500/5 text-emerald-600">Sat</th>
                            <th class="p-5 border-b border-zinc-800 text-center bg-emerald-500/5 text-emerald-600">Sun</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-zinc-800/50">
                        <tr><td colspan="8" class="p-20 text-center text-zinc-700 animate-pulse uppercase text-xs tracking-widest font-bold">Initializing Data Stream...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Updated URL with your new App Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzvIgWNLr7AKYFIYBojblOAZiRY0CPzwiMS5_p2dhsHyZBTltXyYSx47oCHPGamSLC1/exec'; 

        const dp = document.getElementById('datePicker');
        const today = new Date();
        const monday = new Date(today.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1)));
        dp.value = monday.toISOString().split('T')[0];

        async function loadData() {
            const status = document.getElementById('status');
            const tableBody = document.getElementById('tableBody');
            status.innerText = "⚡ FETCHING LIVE DATA...";
            status.classList.add('text-emerald-500');

            try {
                // Fetching from App Script
                const response = await fetch(`${SCRIPT_URL}?week=${dp.value}`);
                const data = await response.json();
                
                let html = '';
                data.forEach(row => {
                    html += `<tr class="hover:bg-emerald-500/[0.03] transition-colors group">
                        <td class="p-5 font-bold text-xs text-zinc-400 sticky left-0 bg-[#050505] z-10 group-hover:text-emerald-400 border-r border-zinc-800/50">${row.name}</td>`;
                    
                    row.daily.forEach((day, idx) => {
                        const isWeekend = idx >= 5;
                        html += `<td class="p-5 text-center ${isWeekend ? 'bg-emerald-500/[0.01]' : ''}">
                            <div class="text-sm font-black ${day.boxes > 0 ? 'text-white' : 'text-zinc-800'}">${day.boxes}</div>
                            <div class="text-[9px] font-mono ${day.weight > 0 ? 'text-zinc-500' : 'text-zinc-700'}">${day.weight}kg</div>
                        </td>`;
                    });
                    html += `</tr>`;
                });
                tableBody.innerHTML = html;
                status.innerText = "✓ DASHBOARD UPDATED";
                status.classList.remove('text-emerald-500');
            } catch (e) {
                status.innerText = "❌ PERMISSION ERROR: RE-DEPLOY SCRIPT AS ANYONE";
                status.classList.add('text-red-500');
                console.error(e);
            }
        }

        dp.addEventListener('change', loadData);
        window.onload = loadData;
    </script>
</body>
</html>
